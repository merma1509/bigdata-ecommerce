services:
  app:
    build: .
    container_name: bigdata-app
    volumes:
      - ../:/app
      - ../output:/app/output
      - ../secrets:/run/secrets:ro
    networks:
      - bigdata-network
    depends_on:
      - postgres
      - mongodb
      - neo4j
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - MONGO_ROOT_PASSWORD_FILE=/run/secrets/mongo_root_password
      - NEO4J_AUTH_FILE=/run/secrets/neo4j_auth

  postgres:
    image: postgres:15
    container_name: bigdata-postgres
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
      - ../secrets/postgres_password:/run/secrets/postgres_password:ro
    networks:
      - bigdata-network

  mongodb:
    image: mongo:6.0
    container_name: bigdata-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME_FILE: /run/secrets/mongo_root_user
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
      MONGO_INITDB_DATABASE: ecommerce
      MONGO_ROOT_USERNAME_FILE: /run/secrets/mongo_root_user
      MONGO_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ../secrets/mongo_root_user:/run/secrets/mongo_root_user:ro
      - ../secrets/mongo_root_password:/run/secrets/mongo_root_password:ro
    networks:
      - bigdata-network

  neo4j:
    image: neo4j:5.8
    container_name: bigdata-neo4j
    environment:
      NEO4J_AUTH: neo4j/rqZiKwiOlkxa9EQ937Ld1goDGSDAvb30lEVmMZ4eOE8=
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_security_procedures_unrestricted: gds.*
      NEO4J_dbms_security_procedures_allowlist: gds.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    networks:
      - bigdata-network

volumes:
  postgres_data:
  mongodb_data:
  neo4j_data:
  neo4j_logs:

networks:
  bigdata-network:
    driver: bridge
